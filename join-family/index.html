<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Family - Memora</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 640px;
        margin: 60px auto;
        padding: 24px;
        line-height: 1.5;
      }
      h1 {
        margin-bottom: 12px;
      }
      p {
        margin-bottom: 16px;
      }
      .buttons {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 20px;
      }
      a.button {
        display: inline-block;
        padding: 12px 18px;
        text-decoration: none;
        border-radius: 8px;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <h1>Join your family on Memora</h1>
    <p id="subtitle">You’ve been invited to join a family.</p>

    <div class="buttons">
      <a class="button" href="myapp://auth/login">Open Memora</a>

      <a
        class="button"
        href="https://apps.apple.com/us/app/memora-family/id6759070272"
      >
        Download Memora
      </a>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const family = params.get("family");

      if (family) {
        const decoded = decodeURIComponent(family.replace(/\+/g, " "));
        document.getElementById("subtitle").textContent =
          `You’ve been invited to join ${decoded}.`;
      }
    </script>
  </body>
</html>
